<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JellyNews — Première configuration</title>
  <link rel="stylesheet" href="/static/style.css?v={{ asset_version }}">
  <link rel="icon" type="image/svg+xml" href="/static/brand/jellynews-mark.svg?v={{ asset_version }}">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/brand/favicon-32.png?v={{ asset_version }}">
  <link rel="icon" href="/static/brand/favicon.ico?v={{ asset_version }}" sizes="any">
  <link rel="apple-touch-icon" href="/static/brand/apple-touch-icon.png?v={{ asset_version }}">
  <link rel="manifest" href="/static/brand/site.webmanifest?v={{ asset_version }}">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="brand-lockup">
      <img class="brand-mark" src="/static/brand/jellynews-mark.svg?v={{ asset_version }}" alt="" aria-hidden="true">
      <div class="brand-text">
        <span class="brand-name">JellyNews</span>
        <span class="brand-subtitle">Media digest</span>
      </div>
    </div>
    <p class="subtitle">Première configuration : créez le compte administrateur.</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="/setup">
      <label>Nom d'utilisateur
        <input type="text" name="username" required minlength="3" autocomplete="username">
      </label>
      <label>Mot de passe (8 caractères min.)
        <input type="password" name="password" required minlength="8" autocomplete="new-password">
      </label>
      <label>Confirmer le mot de passe
        <input type="password" name="password_confirm" required minlength="8" autocomplete="new-password">
      </label>
      <button type="submit" class="btn primary">Créer le compte</button>
    </form>
  </div>
</body>
</html>
