<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">JellyNews mark</title>
  <desc id="desc">Jellyfish media newsletter icon: rounded media tile, play triangle, envelope current, and soft tentacles.</desc>
  <defs>
    <linearGradient id="tile" x1="10" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c4dff"/>
      <stop offset="0.52" stop-color="#00a4dc"/>
      <stop offset="1" stop-color="#00f5d4"/>
    </linearGradient>
    <linearGradient id="shine" x1="20" y1="10" x2="46" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5fbff" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#c8fff5" stop-opacity="0.78"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000816" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect x="7" y="6" width="50" height="42" rx="17" fill="url(#tile)" filter="url(#softShadow)"/>
  <path d="M17 22.5h30v17H17z" fill="#07111f" opacity="0.22"/>
  <path d="M18 23.5 32 33l14-9.5v16H18z" fill="#08111e" opacity="0.28"/>
  <path d="M29 20.5v18l14-9z" fill="url(#shine)"/>
  <path d="M15 22c3.8-7.1 13-10.1 22.5-7.4" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.38"/>

  <path d="M20 47c0 5-6 4.4-6 9" fill="none" stroke="#00f5d4" stroke-width="4" stroke-linecap="round"/>
  <path d="M31 47c0 6-7 5-7 10" fill="none" stroke="#58d5ff" stroke-width="4" stroke-linecap="round"/>
  <path d="M42 47c0 5 6 4.4 6 9" fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
  <circle cx="49" cy="15" r="3" fill="#ffe66d"/>
</svg>
