name: Build Docker image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: gitisane.moopi.ovh
  IMAGE_NAME: ${{ gitea.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Gitea registry
        run: |
          echo "${{ secrets.GITEA_TOKEN }}" | docker login "$REGISTRY" \
            -u "${{ gitea.actor }}" \
            --password-stdin

      - name: Build image
        run: |
          IMAGE="$(echo "$REGISTRY/$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"

          docker build \
            -t "$IMAGE:${{ gitea.sha }}" \
            -t "$IMAGE:latest" \
            .

      - name: Push image
        run: |
          IMAGE="$(echo "$REGISTRY/$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"

          docker push "$IMAGE:${{ gitea.sha }}"
          docker push "$IMAGE:latest"
